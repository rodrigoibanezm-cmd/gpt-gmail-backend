openapi: 3.1.0
info:
  title: GPT Gmail Backend Router
  version: 1.1.2
  description: GPT Action schema for Gmail discovery, Gmail tools, setup profile, and PressureBoard cards.

servers:
  - url: https://gpt-gmail-backend.vercel.app

paths:
  /api/router:
    post:
      operationId: routeGmailTool
      summary: Route Gmail, setup profile, and PressureBoard actions through one backend endpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RouterRequest'
      responses:
        '200':
          description: Router response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouterResponse'

  /api/auth-google:
    get:
      operationId: connectGmail
      summary: Start Google OAuth flow for a user
      parameters:
        - name: userId
          in: query
          required: true
          schema:
            type: string
      responses:
        '302':
          description: Redirects the user to Google OAuth.

components:
  schemas:
    RouterRequest:
      type: object
      additionalProperties: false
      required:
        - action
        - userId
      properties:
        action:
          type: string
          enum:
            - gmail.profile.get
            - gmail.search
            - gmail.search.count
            - gmail.search.all
            - gmail.sent.search
            - gmail.discovery.export
            - gmail.discovery.batch
            - gmail.message.get
            - gmail.thread.get
            - setup.profile.get
            - setup.profile.save
            - pressure.cards.upsert

        tool:
          type: string
        userId:
          type: string
        user_id:
          type: string
        tenant_id:
          type: string
        tenantId:
          type: string

        query:
          type: string
        days:
          type: integer
          minimum: 1
          maximum: 180
        includeInbox:
          type: boolean
        includeSent:
          type: boolean
        maxThreads:
          type: integer
          minimum: 1
          maximum: 100
        maxMessages:
          type: integer
          minimum: 1
          maximum: 100
        maxLatestMessages:
          type: integer
          minimum: 1
          maximum: 10
        maxPayloadChars:
          type: integer
          minimum: 1000
          maximum: 160000
        maxBodyChars:
          type: integer
          minimum: 1000
          maximum: 50000
        cursor:
          type:
            - string
            - 'null'
        pageToken:
          type:
            - string
            - 'null'
        nextCursor:
          type:
            - string
            - 'null'
        mode:
          type: string
        summaryLevel:
          type: string
          enum:
            - minimal
            - compact
            - full
        threadId:
          type: string
        messageId:
          type: string

        params:
          type: object
          additionalProperties: true

        cards:
          type: array
          items:
            $ref: '#/components/schemas/PressureCardInput'

    PressureCardInput:
      type: object
      additionalProperties: false
      required:
        - card_key
        - dimension
        - bucket
        - title
      properties:
        card_key:
          type: string
        dimension:
          type: string
          enum:
            - sos
            - atascados
            - abiertos
            - decidir
            - vigilar
            - operacion
            - ejecutiva
            - comercial
            - financiera
            - otra
        bucket:
          type: string
          enum:
            - sos
            - atascados
            - abiertos
            - decidir
            - vigilar
            - urgente
            - importante
            - tarea
        title:
          type: string
        subtitle:
          type: string
        summary:
          type: string
        why_it_matters:
          type: string
        what_to_do:
          type: string
        severity:
          type: string
          enum:
            - low
            - medium
            - high
            - critical
        status:
          type: string
          enum:
            - active
            - dismissed
            - resolved
        source:
          type: string
        confidence:
          type: number
          minimum: 0
          maximum: 1
        payload:
          type: object
          additionalProperties: true
        agent_context:
          type: object
          additionalProperties: true
        agent_prompt:
          type: string
        evidence:
          type: array
          items:
            $ref: '#/components/schemas/PressureCardEvidenceInput'

    PressureCardEvidenceInput:
      type: object
      additionalProperties: false
      required:
        - source_type
      properties:
        source_type:
          type: string
          enum:
            - gmail_thread
            - gmail_message
            - review
            - metric
            - manual
        source_id:
          type: string
        thread_id:
          type: string
        message_id:
          type: string
        title:
          type: string
        excerpt:
          type: string
        metadata:
          type: object
          additionalProperties: true

    RouterResponse:
      type: object
      additionalProperties: true
      properties:
        status:
          type: string
          enum:
            - success
            - error
        tool:
          type: string
        message:
          type: string
        data:
          type:
            - object
            - 'null'
          additionalProperties: true
